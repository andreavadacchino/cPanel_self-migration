name: migration-platform

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-migration}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-migration}
      POSTGRES_DB: ${POSTGRES_DB:-migration}
    ports:
      # Host port is overridable to avoid clashing with a local Postgres.
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-migration}"]
      interval: 5s
      timeout: 3s
      retries: 12

  redis:
    image: redis:7-alpine
    ports:
      # Host port is overridable to avoid clashing with a local Redis.
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 12

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-migration}:${POSTGRES_PASSWORD:-migration}@postgres:5432/${POSTGRES_DB:-migration}
      REDIS_URL: redis://redis:6379/0
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:5173}
      # Master key that encrypts endpoint tokens at rest. DEV DEFAULT — override
      # PLATFORM_SECRET_KEY in any shared/prod deploy (with this key a DB dump is
      # decryptable). Generate one: python -c "from cryptography.fernet import
      # Fernet; print(Fernet.generate_key().decode())"
      PLATFORM_SECRET_KEY: ${PLATFORM_SECRET_KEY:-u1TjglXJeq9grsU-BA_BCAp8reG_XfT14fT_lHZ-PBA=}
    ports:
      - "${API_PORT:-8000}:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build:
      context: .
      dockerfile: apps/worker/Dockerfile
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-migration}:${POSTGRES_PASSWORD:-migration}@postgres:5432/${POSTGRES_DB:-migration}
      REDIS_URL: redis://redis:6379/0
      # Same master key as the API so the worker can decrypt endpoint tokens.
      PLATFORM_SECRET_KEY: ${PLATFORM_SECRET_KEY:-u1TjglXJeq9grsU-BA_BCAp8reG_XfT14fT_lHZ-PBA=}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8000}
    ports:
      - "${WEB_PORT:-5173}:5173"
    depends_on:
      - api

volumes:
  pgdata:
