name: migration-platform

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-migration}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-migration}
      POSTGRES_DB: ${POSTGRES_DB:-migration}
    ports:
      # Host port is overridable to avoid clashing with a local Postgres.
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-migration}"]
      interval: 5s
      timeout: 3s
      retries: 12

  redis:
    image: redis:7-alpine
    ports:
      # Host port is overridable to avoid clashing with a local Redis.
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 12

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-migration}:${POSTGRES_PASSWORD:-migration}@postgres:5432/${POSTGRES_DB:-migration}
      REDIS_URL: redis://redis:6379/0
      CORS_ORIGINS: http://localhost:5173
      CREDENTIAL_ENCRYPTION_KEY: ${CREDENTIAL_ENCRYPTION_KEY:-}
      PREFLIGHT_INLINE: ${PREFLIGHT_INLINE:-false}
      DOMAIN_WRITER_MODE: ${DOMAIN_WRITER_MODE:-disabled}
      DATABASE_WRITER_MODE: ${DATABASE_WRITER_MODE:-disabled}
      MYSQL_USER_WRITER_MODE: ${MYSQL_USER_WRITER_MODE:-disabled}
      FORWARDER_WRITER_MODE: ${FORWARDER_WRITER_MODE:-disabled}
      CRON_WRITER_MODE: ${CRON_WRITER_MODE:-disabled}
      FTP_WRITER_MODE: ${FTP_WRITER_MODE:-disabled}
      MAILING_LIST_WRITER_MODE: ${MAILING_LIST_WRITER_MODE:-disabled}
      DNS_WRITER_MODE: ${DNS_WRITER_MODE:-disabled}
      AUTORESPONDER_WRITER_MODE: ${AUTORESPONDER_WRITER_MODE:-disabled}
      MOCK_ORCHESTRATOR_MODE: ${MOCK_ORCHESTRATOR_MODE:-disabled}
    ports:
      - "${API_PORT:-8000}:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build:
      context: .
      dockerfile: apps/worker/Dockerfile
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-migration}:${POSTGRES_PASSWORD:-migration}@postgres:5432/${POSTGRES_DB:-migration}
      REDIS_URL: redis://redis:6379/0
      CREDENTIAL_ENCRYPTION_KEY: ${CREDENTIAL_ENCRYPTION_KEY:-}
      DOMAIN_WRITER_MODE: ${DOMAIN_WRITER_MODE:-disabled}
      DATABASE_WRITER_MODE: ${DATABASE_WRITER_MODE:-disabled}
      MYSQL_USER_WRITER_MODE: ${MYSQL_USER_WRITER_MODE:-disabled}
      FORWARDER_WRITER_MODE: ${FORWARDER_WRITER_MODE:-disabled}
      CRON_WRITER_MODE: ${CRON_WRITER_MODE:-disabled}
      FTP_WRITER_MODE: ${FTP_WRITER_MODE:-disabled}
      MAILING_LIST_WRITER_MODE: ${MAILING_LIST_WRITER_MODE:-disabled}
      DNS_WRITER_MODE: ${DNS_WRITER_MODE:-disabled}
      AUTORESPONDER_WRITER_MODE: ${AUTORESPONDER_WRITER_MODE:-disabled}
      MOCK_ORCHESTRATOR_MODE: ${MOCK_ORCHESTRATOR_MODE:-disabled}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    environment:
      VITE_API_BASE_URL: http://localhost:8000
    ports:
      - "${WEB_PORT:-5173}:5173"
    depends_on:
      - api

volumes:
  pgdata:
