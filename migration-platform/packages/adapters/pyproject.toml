[project]
name = "migration-platform-adapters"
version = "0.1.0"
description = "External-system adapter stubs (cPanel/SSH/IMAP). No real logic in Sprint 0."
requires-python = ">=3.11"
dependencies = [
    "httpx>=0.27",
    "pydantic>=2.6",
]

[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
include = ["adapters*"]
