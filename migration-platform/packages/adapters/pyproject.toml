[project]
name = "migration-platform-adapters"
version = "0.1.0"
description = "External-system adapters (cPanel read-only UAPI; SSH/IMAP stubs)."
requires-python = ">=3.11"
dependencies = [
    "pydantic>=2.6",
    "httpx>=0.27",
    # Symmetric encryption for endpoint tokens stored at rest (Fernet).
    "cryptography>=42",
    # cryptography needs bcrypt to parse an OpenSSH private key encrypted with
    # the bcrypt KDF (the default `ssh-keygen` produces) — required to validate
    # an encrypted SSH key before storing it. Without it, a valid encrypted key
    # would fail validation with UnsupportedAlgorithm.
    "bcrypt>=4.0",
]

[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
include = ["adapters*"]
