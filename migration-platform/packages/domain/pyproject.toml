[project]
name = "migration-platform-domain"
version = "0.1.0"
description = "Pure domain models for the migration platform (reference, no infra)."
requires-python = ">=3.11"
dependencies = [
    "pydantic>=2.6",
]

[project.optional-dependencies]
test = [
    "pytest>=8.0",
]

[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
include = ["domain*"]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-q"
