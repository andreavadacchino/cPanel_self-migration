name: Dependency Review

on:
  pull_request:
    branches: [ main, dev ]
    # Dependency Review inspects changes to the dependency manifest/lockfile.
    # Editing a workflow file is not a dependency change, so '.github/workflows/**'
    # was dropped: it only forced the job to run (and, on this fork, fail) on
    # CI-only PRs that touch no dependencies.
    paths:
      - 'go.mod'
      - 'go.sum'

permissions:
  contents: read
  pull-requests: write

jobs:
  dependency-review:
    runs-on: ubuntu-latest
    # GitHub does not support Dependency Review on forks: the API returns
    # "Dependency review is not supported on this repository" before any diff is
    # analysed, so on a fork the job can neither pass nor find anything -- it can
    # only error. Skip it here (documented, not silenced) and keep it a real,
    # blocking gate on the upstream (non-fork) repository, where it works.
    if: ${{ !github.event.repository.fork }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          # No later step uses the git remote (dependency-review is API-based via
          # GITHUB_TOKEN), so don't leave the token in .git/config.
          persist-credentials: false

      - name: Dependency Review
        uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294 # pinned from actions/dependency-review-action@v5.0.0
        with:
          # Blocca solo severity critical (zero-touch per gli altri)
          fail-on-severity: critical

          # Permetti solo licenze approvate
          # Note: golang.org/x/* include il file PATENTS, rilevato come LicenseRef-scancode-google-patent-license-golang.
          allow-licenses: MIT, Apache-2.0, BSD-2-Clause, BSD-3-Clause, ISC, LicenseRef-scancode-google-patent-license-golang

          # Blocca dipendenze con licenze problematiche
          # deny-licenses: GPL-2.0, GPL-3.0, AGPL-3.0

          # Commenta PR con dettagli vulnerabilità
          comment-summary-in-pr: always

          # Output formato per debugging
          base-ref: ${{ github.event.pull_request.base.sha }}
          head-ref: ${{ github.event.pull_request.head.sha }}
