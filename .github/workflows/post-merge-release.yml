name: Post Merge Release

on:
  pull_request:
    branches:
      - main
    types:
      - closed

permissions:
  contents: write
  pull-requests: read

concurrency:
  group: post-merge-release
  cancel-in-progress: false

env:
  GH_TOKEN: ${{ secrets.RELEASE_BOT_TOKEN_CPANEL }}
  GITHUB_TOKEN: ${{ secrets.RELEASE_BOT_TOKEN_CPANEL }}

jobs:
  finalize-release:
    name: finalize-release
    if: >
      github.event.pull_request.merged == true &&
      github.event.pull_request.base.ref == 'main' &&
      github.event.pull_request.head.ref == 'dev' &&
      github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          fetch-depth: 0
          token: ${{ secrets.RELEASE_BOT_TOKEN_CPANEL || github.token }}

      - name: Finalize release
        shell: bash
        env:
          MERGE_SHA: ${{ github.event.pull_request.merge_commit_sha }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          set -euo pipefail
          source .github/scripts/release-policy.sh

          HAS_RELEASE_MARKER="false"
          TAG=""

          if TAG="$(extract_pr_marker release-tag)"; then
            HAS_RELEASE_MARKER="true"
            validate_release_tag "${TAG}"
          else
            notice "No release marker found; syncing dev to the squash commit without publishing a release."
          fi

          git fetch --force origin dev main

          MAIN_SHA="$(git rev-parse origin/main)"
          DEV_SHA="$(git rev-parse origin/dev)"

          [[ "${MERGE_SHA}" == "${MAIN_SHA}" ]] || die "main (${MAIN_SHA}) does not point to the PR merge commit (${MERGE_SHA})."

          PARENT_COUNT="$(git show -s --format=%P "${MERGE_SHA}" | wc -w | tr -d ' ')"
          [[ "${PARENT_COUNT}" == "1" ]] || die "The PR was not squash-merged; refusing to create a release."

          # Content gate that tolerates dev advancing during review: the squash
          # commit on main must capture EXACTLY the current dev tree. We compare
          # trees, not commit shas, so review fix commits (which rewrite history
          # and change the head sha) are fine as long as the released content
          # equals dev. If dev carries extra content the merge does not include,
          # we refuse to clobber it and ask for a manual reconcile.
          MERGE_TREE="$(git rev-parse "${MERGE_SHA}^{tree}")"
          DEV_TREE="$(git rev-parse "origin/dev^{tree}")"
          [[ "${MERGE_TREE}" == "${DEV_TREE}" ]] || die "origin/dev content differs from the merged release; refusing to overwrite dev. Reconcile dev with main manually."

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # Fast-forward dev onto the squash commit. This REPLACES the old
          # sync-dev.yml (which did a destructive `reset --hard` + bare `--force`).
          # Lease on the dev we just observed so a genuine concurrent push aborts
          # instead of being silently lost. Runs for both release and maintenance
          # (no-marker) PRs.
          git push origin "${MERGE_SHA}:refs/heads/dev" --force-with-lease="refs/heads/dev:${DEV_SHA}"

          if [[ "${HAS_RELEASE_MARKER}" != "true" ]]; then
            notice "dev synchronized to ${MERGE_SHA}; no release marker was present."
            exit 0
          fi

          if gh release view "${TAG}" >/dev/null 2>&1; then
            die "Release ${TAG} already exists; refusing to overwrite it."
          fi

          # Re-create the authoritative ANNOTATED tag on the squash commit (this
          # project's tags are annotated, unlike haier_hon's lightweight tags).
          # Force-push so this does NOT silently depend on the delete succeeding:
          # a plain (non-forced) tag push is rejected as non-fast-forward when a
          # stale tag still points elsewhere, which would abort AFTER dev was
          # already fast-forwarded and leave a release-less partial state.
          git tag -fa "${TAG}" -m "Release ${TAG}" "${MERGE_SHA}"
          if ! git push origin --force "refs/tags/${TAG}"; then
            # Some rulesets forbid force-updating v* tags but allow delete+create.
            notice "Force-updating tag ${TAG} was rejected; retrying via delete + create."
            git push origin ":refs/tags/${TAG}" || true
            git push origin "refs/tags/${TAG}"
          fi

          # Backstop: never let release.yml cut a release against a stale tag.
          # The tag is ANNOTATED, so deref to the commit with ^{} (a bare
          # `ls-remote refs/tags/<tag>` returns the tag-object sha, not the
          # commit, and would always mismatch).
          PUBLISHED_TAG_SHA="$(git ls-remote --tags origin "refs/tags/${TAG}^{}" | awk 'NR==1{print $1}')"
          [[ "${PUBLISHED_TAG_SHA}" == "${MERGE_SHA}" ]] \
            || die "Tag ${TAG} did not publish onto the squash commit ${MERGE_SHA} (remote: ${PUBLISHED_TAG_SHA:-<absent>}); aborting."

          # NOTE: we do NOT create the GitHub release here. Pushing the tag (via
          # RELEASE_BOT_TOKEN_CPANEL, a PAT) re-triggers release.yml, whose gate now
          # passes (tag is on main) and GoReleaser builds + signs + publishes.
          notice "Tag ${TAG} published on squash commit ${MERGE_SHA}; release.yml will now cut the release."
